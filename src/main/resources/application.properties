spring.application.name=MicroServiceOffre
spring.cloud.config.enabled=true
spring.cloud.config.fail-fast=true
spring.cloud.config.import-check.enabled=false
spring.config.import=optional:configserver:http://localhost:8097


server.port=8083
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
# H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2
# Datasource
spring.datasource.username=Douaa
spring.datasource.password=
spring.datasource.url=jdbc:h2:file:./Database/Data/Offre;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto = update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka